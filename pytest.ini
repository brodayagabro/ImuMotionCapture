[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --cov=host
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --timeout=10
filterwarnings =
    ignore::DeprecationWarning:matplotlib.*
    ignore::UserWarning:tkinter.*